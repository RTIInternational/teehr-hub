# Deploy the Jupyter user service account
kind: Deploy
type: kubernetes
name: jupyter-serviceaccount
spec:
  manifestTemplates:
    - manifests/jupyter-serviceaccount.yaml.tpl
---

# Deploy local JupyterHub profile list config map
kind: Deploy
type: kubernetes
name: jupyterhub-profile-list-local
environments:
  - local
dependencies:
  - build.teehr-jupyter-driver-image-edge
spec:
  manifestTemplates:
    - manifests/jupyterhub-profile-list-local.configmap.yaml.tpl
---

# Deploy remote JupyterHub profile list config map
kind: Deploy
type: kubernetes
name: jupyterhub-profile-list-remote
environments:
  - remote
dependencies:
  - build.teehr-jupyter-driver-image-edge
  - build.teehr-jupyter-driver-image-stable
  - build.teehr-jupyter-driver-image-previous
spec:
  manifestTemplates:
    - manifests/jupyterhub-profile-list-remote.configmap.yaml.tpl
---

# Local environment deployment
kind: Deploy
type: helm
name: teehr-jupyterhub
environments:
  - local
dependencies:
  - deploy.secrets
  - deploy.jupyter-serviceaccount
  - deploy.jupyterhub-profile-list-local
  - deploy.keycloak-bootstrap
  - build.teehr-jupyter-driver-image-edge
  - build.teehr-spark-executor-image

spec:
  chart:
    name: jupyterhub
    repo: https://hub.jupyter.org/helm-chart
    version: 4.3.0

  values:
    proxy:
      service:
        type: ClusterIP
      # chp:
      #   nodeSelector:
      #     teehr-hub/nodegroup-name: core-a

    hub:
      # nodeSelector:
      #   teehr-hub/nodegroup-name: core-a
      # baseUrl: /jupyter

      config:
        GenericOAuthenticator:
          login_service: Keycloak
          oauth_callback_url: https://hub.${var.hostname}/hub/oauth_callback
          authorize_url: https://auth.${var.hostname}/realms/teehr/protocol/openid-connect/auth
          token_url: http://keycloak-service:8080/realms/teehr/protocol/openid-connect/token
          userdata_url: http://keycloak-service:8080/realms/teehr/protocol/openid-connect/userinfo
          logout_redirect_url: https://auth.${var.hostname}/realms/teehr/protocol/openid-connect/logout?client_id=jupyterhub&post_logout_redirect_uri=https%3A%2F%2Fhub.${var.hostname}
          username_claim: preferred_username
          manage_groups: true
          scope:
            - openid
            - profile
            - email
          claim_groups_key: groups
          allowed_groups:
            - jupyter-user
            - jupyter-admin
        JupyterHub:
          authenticator_class: generic-oauth
          redirect_to_server: false
          default_url: /hub/spawn
          allow_named_servers: true
          named_server_limit_per_user: 5
        Authenticator:
          manage_groups: true
          admin_groups:
            - jupyter-admin
      extraEnv:
        OAUTH_CLIENT_ID:
          valueFrom:
            secretKeyRef:
              name: jupyterhub
              key: OAUTH_CLIENT_ID
        OAUTH_CLIENT_SECRET:
          valueFrom:
            secretKeyRef:
              name: jupyterhub
              key: OAUTH_CLIENT_SECRET
        JUPYTERHUB_PROFILE_LIST_JSON:
          valueFrom:
            configMapKeyRef:
              name: jupyterhub-profile-list
              key: profile-list.json
              optional: true

      extraConfig:
        spark-config: |
          # Allow users to create Spark sessions
          c.KubeSpawner.service_account = 'jupyter'
          c.KubeSpawner.automount_service_account_token = True
        profile-list-loader: |
          import json
          import os

          raw_profile_config = os.environ.get("JUPYTERHUB_PROFILE_LIST_JSON", "").strip()
          if raw_profile_config:
              try:
                  parsed_profile_config = json.loads(raw_profile_config)
              except Exception as exc:
                  raise RuntimeError("Invalid JUPYTERHUB_PROFILE_LIST_JSON: not valid JSON") from exc

              if isinstance(parsed_profile_config, dict):
                  profile_version = parsed_profile_config.get("version")
                  profile_list = parsed_profile_config.get("profiles")
                  if profile_version is not None and profile_version != 1:
                      raise RuntimeError(f"Unsupported profile config version: {profile_version}")
              else:
                  profile_list = parsed_profile_config

              if not isinstance(profile_list, list):
                  raise RuntimeError("JUPYTERHUB_PROFILE_LIST_JSON must be a list or an object with a profiles list")

              for index, profile in enumerate(profile_list):
                  if not isinstance(profile, dict):
                      raise RuntimeError(f"Profile at index {index} must be an object")
                  if "display_name" not in profile:
                      raise RuntimeError(f"Profile at index {index} is missing required key: display_name")

              c.KubeSpawner.profile_list = profile_list
        cull-kernels: |
          c.MappingKernelManager.cull_idle_timeout = 3600
          c.MappingKernelManager.cull_connected = True
          c.MappingKernelManager.cull_busy = False

    singleuser:
      image:
        name: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageName}
        tag: ${actions.build.teehr-jupyter-driver-image-edge.version}
        pullPolicy: Always
      networkPolicy:
      # ToDo: Investigate this.  Implications, etc.
        enabled: false
      storage:
        extraVolumes:
        - name: teehr-hub-data-nfs
          persistentVolumeClaim:
              claimName: data-nfs
        extraVolumeMounts:
        - name: teehr-hub-data-nfs
          mountPath: /data
      extraEnv:
        TEEHR_SPARK_IMAGE: ${actions.build.teehr-spark-executor-image.outputs.deploymentImageId}
        TEEHR_NAMESPACE: ${environment.namespace}
        AWS_REGION: ${var.aws.region}
        TEEHR_DOWNLOAD_API_KEY:
          valueFrom:
            secretKeyRef:
              name: jupyter-user-secrets
              key: api-key
        REMOTE_CATALOG_TYPE: ${var.iceberg.catalogType}
        REMOTE_CATALOG_REST_URI: ${var.iceberg.catalogUri}
        REMOTE_WAREHOUSE_S3_PATH: ${var.iceberg.catalogWarehouse}
        REMOTE_CATALOG_S3_ENDPOINT: ${var.iceberg.catalogS3Endpoint}
        REMOTE_CATALOG_S3_PATH_STYLE_ACCESS: ${var.iceberg.catalogS3PathStyleAccess}
        IN_CLUSTER: ${var.iceberg.inCluster}
      extraFiles:
        jupyter_config:
          mountPath: /etc/jupyter/jupyter_notebook_config.py
          stringData: |
            c.ServerProxy.servers = {
              "spark_ui": {
                  "port" : 4040,
                  "absolute_url": False,
                  "launcher_entry": {
                      "enabled": True,
                      "icon_path": "/etc/jupyter/spark_ui.svg",
                      "title": "Spark UI",
                      "path_info": "spark_ui/jobs/"
                  },
                  "new_browser_tab": False
              }
            }

    prePuller:
      hook:
        enabled: false
      continuous:
        enabled: false

    scheduling:
      userScheduler:
        enabled: true
      userPods:
        nodeAffinity:
          matchNodePurpose: require

    cull:
      enabled: true
      timeout: 3600
      every: 300
      adminUsers: false
---

