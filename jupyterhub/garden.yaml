# Deploy the Jupyter user service account
kind: Deploy
type: kubernetes
name: jupyter-serviceaccount
spec:
  files:
    - manifests/jupyter-serviceaccount.yaml
---

# Local environment deployment
kind: Deploy
type: helm
name: teehr-jupyterhub
environments:
  - local
dependencies:
  - deploy.secrets
  - deploy.jupyter-serviceaccount
  - build.teehr-jupyter-driver-image-edge
  - build.teehr-spark-executor-image

spec:
  chart:
    name: jupyterhub
    repo: https://hub.jupyter.org/helm-chart
    version: 4.3.0

  values:
    proxy:
      service:
        type: ClusterIP
      # chp:
      #   nodeSelector:
      #     teehr-hub/nodegroup-name: core-a

    hub:
      # nodeSelector:
      #   teehr-hub/nodegroup-name: core-a
      # baseUrl: /jupyter

      config:
        DummyAuthenticator:
          password: password
        JupyterHub:
          authenticator_class: dummy
          allow_named_servers: true
          named_server_limit_per_user: 5
        Authenticator:
          admin_users:
            - admin
          allowed_users:
            - user

      extraConfig:
        spark-config: |
          # Allow users to create Spark sessions
          c.KubeSpawner.service_account = 'jupyter'
          c.KubeSpawner.automount_service_account_token = True

    singleuser:
      image:
        name: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageName}
        tag: ${actions.build.teehr-jupyter-driver-image-edge.version}
        pullPolicy: Always
      defaultUrl: "/lab"
      networkPolicy:
      # ToDo: Investigate this.  Implications, etc.
        enabled: false
      storage:
        extraVolumes:
        - name: teehr-hub-data-nfs
          persistentVolumeClaim:
              claimName: data-nfs
        extraVolumeMounts:
        - name: teehr-hub-data-nfs
          mountPath: /data
      extraEnv:
        TEEHR_SPARK_IMAGE: ${actions.build.teehr-spark-executor-image.outputs.deploymentImageId}
        TEEHR_NAMESPACE: ${environment.namespace}
        AWS_REGION: us-east-2
        REMOTE_CATALOG_TYPE: ${var.iceberg.catalogType}
        REMOTE_CATALOG_REST_URI: ${var.iceberg.catalogUri}
        REMOTE_WAREHOUSE_S3_PATH: ${var.iceberg.catalogWarehouse}
        REMOTE_CATALOG_S3_ENDPOINT: ${var.iceberg.catalogS3Endpoint}
        REMOTE_CATALOG_S3_PATH_STYLE_ACCESS: ${var.iceberg.catalogS3PathStyleAccess}
        IN_CLUSTER: ${var.iceberg.inCluster}
      extraFiles:
        jupyter_config:
          mountPath: /etc/jupyter/jupyter_notebook_config.py
          stringData: |
            c.ServerProxy.servers = {
              "spark_ui": {
                  "port" : 4040,
                  "absolute_url": False,
                  "launcher_entry": {
                      "enabled": True,
                      "icon_path": "/etc/jupyter/spark_ui.svg",
                      "title": "Spark UI",
                      "path_info": "spark_ui/jobs/"
                  },
                  "new_browser_tab": False
              }
            }
      profileList:
      - display_name: "TEEHR Evaluation System (local)"
        default: True
        description: "A node on the local KIND cluster"
        profile_options:
          image:
            display_name: Image
            choices:
              current-tag:
                display_name: Bleeding Edge ${slice(var.devTeehrVersion, 0, 6)}
                default: true
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageId}
        kubespawner_override:
          node_selector:
            teehr-hub/nodegroup-name: nb-r5-xlarge
      - display_name: "HEFS-FEWS Evaluation System (local)"
        default: False
        description: "A node on the local KIND cluster"
        profile_options:
          image:
            display_name: Image
            choices:
              v0-3-0:
                display_name: Version 0.3.x
                default: true
                kubespawner_override:
                  image: "hefs-hub:0.3.0"
        kubespawner_override:
          image_pull_policy: IfNotPresent
          node_selector:
            teehr-hub/nodegroup-name: nb-r5-xlarge
    prePuller:
      hook:
        enabled: false
      continuous:
        enabled: false

    scheduling:
      userScheduler:
        enabled: true
      userPods:
        nodeAffinity:
          matchNodePurpose: require

    cull:
      enabled: true
      timeout: 3600
      every: 300
      adminUsers: false
---

# Production environment deployment
kind: Deploy
type: helm
name: teehr-jupyterhub
environments:
  - remote
dependencies:
  - deploy.secrets
  - deploy.jupyter-serviceaccount
  - build.teehr-jupyter-driver-image-edge
  - build.teehr-spark-executor-image
  - build.teehr-jupyter-driver-image-stable
  # - build.teehr-jupyter-driver-image-previous

spec:
  chart:
    name: jupyterhub
    repo: https://hub.jupyter.org/helm-chart
    version: 4.3.0

  values:
    proxy:
      service:
        type: ClusterIP
      chp:
        nodeSelector:
          teehr-hub/nodegroup-name: core-a

    hub:
      nodeSelector:
        teehr-hub/nodegroup-name: core-a
      config:
        GitHubOAuthenticator:
          oauth_callback_url: https://hub.teehr.rtiamanzi.org/hub/oauth_callback
          allowed_organizations:
            - rtiinternational:teehr-hub-users
          scope:
            - read:org
        JupyterHub:
          authenticator_class: github
          allow_named_servers: true
          named_server_limit_per_user: 5
        Authenticator:
          admin_users:
            - mgdenno
            - slamont
      extraEnv:
        OAUTH_CLIENT_ID:
          valueFrom:
            secretKeyRef:
              name: jupyterhub
              key: OAUTH_CLIENT_ID
        OAUTH_CLIENT_SECRET:
          valueFrom:
            secretKeyRef:
              name: jupyterhub
              key: OAUTH_CLIENT_SECRET
      extraConfig:
        spark-config: |
          # Allow users to create Spark sessions
          c.KubeSpawner.service_account = 'jupyter'
          c.KubeSpawner.automount_service_account_token = True

    singleuser:
      image:
        name: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageName}
        tag: ${actions.build.teehr-jupyter-driver-image-edge.version}
        pullPolicy: ${environment.name == 'local' ? 'Always':'IfNotPresent'}
      defaultUrl: "/lab"
      networkPolicy:
        enabled: false
      uid: 1000
      fsGid: 1000
      storage:
        extraVolumes:
        - name: teehr-hub-data-nfs
          persistentVolumeClaim:
              claimName: data-nfs
        extraVolumeMounts:
        - name: teehr-hub-data-nfs
          mountPath: /data
      extraEnv:
        TEEHR_SPARK_IMAGE: ${actions.build.teehr-spark-executor-image.outputs.deploymentImageId}
        TEEHR_NAMESPACE: ${environment.namespace}
        AWS_REGION: us-east-2
        REMOTE_CATALOG_TYPE: ${var.iceberg.catalogType}
        REMOTE_CATALOG_REST_URI: ${var.iceberg.catalogUri}
        REMOTE_WAREHOUSE_S3_PATH: ${var.iceberg.catalogWarehouse}
        REMOTE_CATALOG_S3_ENDPOINT: ${var.iceberg.catalogS3Endpoint}
        REMOTE_CATALOG_S3_PATH_STYLE_ACCESS: ${var.iceberg.catalogS3PathStyleAccess}
        IN_CLUSTER: ${var.iceberg.inCluster}
        TRINO_HOST: ${var.trino.host}
        TRINO_PORT: ${var.trino.port}
        TRINO_CATALOG: ${var.trino.catalog}
        TRINO_SCHEMA: ${var.trino.schema}
        TRINO_USER: ${var.trino.user}
      extraFiles:
        jupyter_config:
          mountPath: /etc/jupyter/jupyter_notebook_config.py
          stringData: |
            c.ServerProxy.servers = {
              "spark_ui": {
                  "port" : 4040,
                  "absolute_url": False,
                  "launcher_entry": {
                      "enabled": True,
                      "icon_path": "/etc/jupyter/spark_ui.svg",
                      "title": "Spark UI",
                      "path_info": "spark_ui/jobs/"
                  },
                  "new_browser_tab": False
              }
            }
      
      profileList:
      # TEEHR Project (default - uses base node groups)
      - display_name: "TEEHR Project"
        default: true
        description: "Choose this profile for work related to the TEEHR Project."
        profile_options:
          image:
            display_name: Image
            choices:
              current-tag-xlarge:
                display_name: XL (r5-xlarge, 4 cores, 16 GB memory) (Version ${var.stableTeehrVersion})
                default: true
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-stable.outputs.deploymentImageId}
                  mem_limit: 32G
                  mem_guarantee: 19G
                  cpu_limit: 4
                  cpu_guarantee: 3
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-xlarge
              current-tag-4xlarge:
                display_name: 4XL (r5-4xlarge, 16 cores, 128 GB memory) (Version ${var.stableTeehrVersion})
                default: false
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-stable.outputs.deploymentImageId}
                  mem_limit: 128G
                  mem_guarantee: 76G
                  cpu_limit: 16
                  cpu_guarantee: 12
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-4xlarge
              previous-tag-xlarge:
                display_name: XL (r5-xlarge, 4 cores, 16 GB memory) (Version ${var.previousTeehrVersion})
                default: true
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-previous.outputs.deploymentImageId}
                  mem_limit: 32G
                  mem_guarantee: 19G
                  cpu_limit: 4
                  cpu_guarantee: 3
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-xlarge
              previous-tag-4xlarge:
