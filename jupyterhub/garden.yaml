# Deploy the Jupyter user service account
kind: Deploy
type: kubernetes
name: jupyter-serviceaccount
spec:
  manifestTemplates:
    - manifests/jupyter-serviceaccount.yaml.tpl
---

# Local environment deployment
kind: Deploy
type: helm
name: teehr-jupyterhub
environments:
  - local
dependencies:
  - deploy.secrets
  - deploy.jupyter-serviceaccount
  - deploy.keycloak-bootstrap
  - build.teehr-jupyter-driver-image-edge
  - build.teehr-spark-executor-image

spec:
  chart:
    name: jupyterhub
    repo: https://hub.jupyter.org/helm-chart
    version: 4.3.0

  values:
    proxy:
      service:
        type: ClusterIP
      # chp:
      #   nodeSelector:
      #     teehr-hub/nodegroup-name: core-a

    hub:
      # nodeSelector:
      #   teehr-hub/nodegroup-name: core-a
      # baseUrl: /jupyter

      config:
        GenericOAuthenticator:
          login_service: Keycloak
          oauth_callback_url: https://hub.${var.hostname}/hub/oauth_callback
          authorize_url: https://auth.${var.hostname}/realms/teehr/protocol/openid-connect/auth
          token_url: http://keycloak-service:8080/realms/teehr/protocol/openid-connect/token
          userdata_url: http://keycloak-service:8080/realms/teehr/protocol/openid-connect/userinfo
          logout_redirect_url: https://auth.${var.hostname}/realms/teehr/protocol/openid-connect/logout?client_id=jupyterhub&post_logout_redirect_uri=https%3A%2F%2Fhub.${var.hostname}
          username_claim: preferred_username
          manage_groups: true
          scope:
            - openid
            - profile
            - email
          claim_groups_key: groups
          allowed_groups:
            - jupyter-user
            - jupyter-admin
        JupyterHub:
          authenticator_class: generic-oauth
          redirect_to_server: false
          default_url: /hub/spawn
          allow_named_servers: true
          named_server_limit_per_user: 5
        Authenticator:
          manage_groups: true
          admin_groups:
            - jupyter-admin
      extraEnv:
        OAUTH_CLIENT_ID:
          valueFrom:
            secretKeyRef:
              name: jupyterhub
              key: OAUTH_CLIENT_ID
        OAUTH_CLIENT_SECRET:
          valueFrom:
            secretKeyRef:
              name: jupyterhub
              key: OAUTH_CLIENT_SECRET

      extraConfig:
        spark-config: |
          # Allow users to create Spark sessions
          c.KubeSpawner.service_account = 'jupyter'
          c.KubeSpawner.automount_service_account_token = True
        cull-kernels: |
          c.MappingKernelManager.cull_idle_timeout = 3600
          c.MappingKernelManager.cull_connected = True
          c.MappingKernelManager.cull_busy = False

    singleuser:
      image:
        name: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageName}
        tag: ${actions.build.teehr-jupyter-driver-image-edge.version}
        pullPolicy: Always
      networkPolicy:
      # ToDo: Investigate this.  Implications, etc.
        enabled: false
      storage:
        extraVolumes:
        - name: teehr-hub-data-nfs
          persistentVolumeClaim:
              claimName: data-nfs
        extraVolumeMounts:
        - name: teehr-hub-data-nfs
          mountPath: /data
      extraEnv:
        TEEHR_SPARK_IMAGE: ${actions.build.teehr-spark-executor-image.outputs.deploymentImageId}
        TEEHR_NAMESPACE: ${environment.namespace}
        AWS_REGION: us-east-1
        TEEHR_DOWNLOAD_API_KEY:
          valueFrom:
            secretKeyRef:
              name: jupyter-user-secrets
              key: api-key
        REMOTE_CATALOG_TYPE: ${var.iceberg.catalogType}
        REMOTE_CATALOG_REST_URI: ${var.iceberg.catalogUri}
        REMOTE_WAREHOUSE_S3_PATH: ${var.iceberg.catalogWarehouse}
        REMOTE_CATALOG_S3_ENDPOINT: ${var.iceberg.catalogS3Endpoint}
        REMOTE_CATALOG_S3_PATH_STYLE_ACCESS: ${var.iceberg.catalogS3PathStyleAccess}
        IN_CLUSTER: ${var.iceberg.inCluster}
      extraFiles:
        jupyter_config:
          mountPath: /etc/jupyter/jupyter_notebook_config.py
          stringData: |
            c.ServerProxy.servers = {
              "spark_ui": {
                  "port" : 4040,
                  "absolute_url": False,
                  "launcher_entry": {
                      "enabled": True,
                      "icon_path": "/etc/jupyter/spark_ui.svg",
                      "title": "Spark UI",
                      "path_info": "spark_ui/jobs/"
                  },
                  "new_browser_tab": False
              }
            }
      profileList:
      - display_name: "TEEHR Evaluation System (local)"
        default: True
        description: "A node on the local KIND cluster"
        profile_options:
          image:
            display_name: Image
            choices:
              current-tag:
                display_name: Bleeding Edge ${slice(var.devTeehrVersion, 0, 6)}
                default: true
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageId}
        kubespawner_override:
          node_selector:
            teehr-hub/nodegroup-name: nb-r5-xlarge
      - display_name: "HEFS-FEWS Evaluation System (local)"
        default: False
        description: "A node on the local KIND cluster"
        profile_options:
          image:
            display_name: Image
            choices:
              v0-3-0:
                display_name: Version 0.3.x
                default: true
                kubespawner_override:
                  image: "hefs-hub:0.3.0"
        kubespawner_override:
          image_pull_policy: IfNotPresent
          node_selector:
            teehr-hub/nodegroup-name: nb-r5-xlarge

    prePuller:
      hook:
        enabled: false
      continuous:
        enabled: false

    scheduling:
      userScheduler:
        enabled: true
      userPods:
        nodeAffinity:
          matchNodePurpose: require

    cull:
      enabled: true
      timeout: 3600
      every: 300
      adminUsers: false
---

# Production environment deployment
kind: Deploy
type: helm
name: teehr-jupyterhub
environments:
  - remote
dependencies:
  - deploy.secrets
  - deploy.jupyter-serviceaccount
  - deploy.keycloak-bootstrap
  - build.teehr-jupyter-driver-image-edge
  - build.teehr-spark-executor-image
  - build.teehr-jupyter-driver-image-stable
  - build.teehr-jupyter-driver-image-previous

spec:
  chart:
    name: jupyterhub
    repo: https://hub.jupyter.org/helm-chart
    version: 4.3.0

  values:
    proxy:
      service:
        type: ClusterIP
      chp:
        nodeSelector:
          teehr-hub/nodegroup-name: core-a

    hub:
      nodeSelector:
        teehr-hub/nodegroup-name: core-a
      config:
        GenericOAuthenticator:
          login_service: Keycloak
          oauth_callback_url: https://hub.${var.hostname}/hub/oauth_callback
          authorize_url: https://auth.${var.hostname}/realms/teehr/protocol/openid-connect/auth
          token_url: http://keycloak-service:8080/realms/teehr/protocol/openid-connect/token
          userdata_url: http://keycloak-service:8080/realms/teehr/protocol/openid-connect/userinfo
          logout_redirect_url: https://auth.${var.hostname}/realms/teehr/protocol/openid-connect/logout?client_id=jupyterhub&post_logout_redirect_uri=https%3A%2F%2Fhub.${var.hostname}
          username_claim: preferred_username
          manage_groups: true
          scope:
            - openid
            - profile
            - email
          claim_groups_key: groups
          allowed_groups:
            - jupyter-user
            - jupyter-admin
        JupyterHub:
          authenticator_class: generic-oauth
          redirect_to_server: false
          default_url: /hub/spawn
          allow_named_servers: true
          named_server_limit_per_user: 5
        Authenticator:
          manage_groups: true
          admin_groups:
            - jupyter-admin
      extraEnv:
        OAUTH_CLIENT_ID:
          valueFrom:
            secretKeyRef:
              name: jupyterhub
              key: OAUTH_CLIENT_ID
        OAUTH_CLIENT_SECRET:
          valueFrom:
            secretKeyRef:
              name: jupyterhub
              key: OAUTH_CLIENT_SECRET
      extraConfig:
        spark-config: |
          # Allow users to create Spark sessions
          c.KubeSpawner.service_account = 'jupyter'
          c.KubeSpawner.automount_service_account_token = True
        cull-kernels: |
          c.MappingKernelManager.cull_idle_timeout = 3600
          c.MappingKernelManager.cull_connected = True
          c.MappingKernelManager.cull_busy = False

    singleuser:
      image:
        name: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageName}
        tag: ${actions.build.teehr-jupyter-driver-image-edge.version}
        pullPolicy: ${environment.name == 'local' ? 'Always':'IfNotPresent'}
      networkPolicy:
        enabled: false
      uid: 1000
      fsGid: 1000
      storage:
        extraVolumes:
        - name: teehr-hub-data-nfs
          persistentVolumeClaim:
              claimName: data-nfs
        extraVolumeMounts:
        - name: teehr-hub-data-nfs
          mountPath: /data
      extraEnv:
        TEEHR_SPARK_IMAGE: ${actions.build.teehr-spark-executor-image.outputs.deploymentImageId}
        TEEHR_NAMESPACE: ${environment.namespace}
        AWS_REGION: us-east-1
        REMOTE_CATALOG_TYPE: ${var.iceberg.catalogType}
        REMOTE_CATALOG_REST_URI: ${var.iceberg.catalogUri}
        REMOTE_WAREHOUSE_S3_PATH: ${var.iceberg.catalogWarehouse}
        REMOTE_CATALOG_S3_ENDPOINT: ${var.iceberg.catalogS3Endpoint}
        REMOTE_CATALOG_S3_PATH_STYLE_ACCESS: ${var.iceberg.catalogS3PathStyleAccess}
        IN_CLUSTER: ${var.iceberg.inCluster}
        TRINO_HOST: ${var.trino.host}
        TRINO_PORT: ${var.trino.port}
        TRINO_CATALOG: ${var.trino.catalog}
        TRINO_SCHEMA: ${var.trino.schema}
        TRINO_USER: ${var.trino.user}
      extraFiles:
        jupyter_config:
          mountPath: /etc/jupyter/jupyter_notebook_config.py
          stringData: |
            c.ServerProxy.servers = {
              "spark_ui": {
                  "port" : 4040,
                  "absolute_url": False,
                  "launcher_entry": {
                      "enabled": True,
                      "icon_path": "/etc/jupyter/spark_ui.svg",
                      "title": "Spark UI",
                      "path_info": "spark_ui/jobs/"
                  },
                  "new_browser_tab": False
              }
            }

      profileList:
      # TEEHR Project (default - uses base node groups)
      - display_name: "TEEHR Project"
        default: true
        description: "Choose this profile for work related to the TEEHR Project."
        profile_options:
          image:
            display_name: Image
            choices:
              current-tag-xlarge:
                display_name: Version ${var.stableTeehrVersion} - XL (4 cores, 16 GB memory) 
                default: true
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-stable.outputs.deploymentImageId}
                  mem_limit: 32G
                  mem_guarantee: 19G
                  cpu_limit: 4
                  cpu_guarantee: 3
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-xlarge
              current-tag-4xlarge:
                display_name: Version ${var.stableTeehrVersion} - 4XL (16 cores, 128 GB memory) 
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-stable.outputs.deploymentImageId}
                  mem_limit: 127G
                  mem_guarantee: 76G
                  cpu_limit: 15.5
                  cpu_guarantee: 12
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-4xlarge
              previous-tag-xlarge:
                display_name: Version ${var.previousTeehrVersion} - XL (4 cores, 32 GB memory) 
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-previous.outputs.deploymentImageId}
                  mem_limit: 32G
                  mem_guarantee: 19G
                  cpu_limit: 4
                  cpu_guarantee: 3
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-xlarge
              previous-tag-4xlarge:
                display_name: Version ${var.previousTeehrVersion} - 4XL (16 cores, 128 GB memory) 
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-previous.outputs.deploymentImageId}
                  mem_limit: 128G
                  mem_guarantee: 76G
                  cpu_limit: 16
                  cpu_guarantee: 12
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-4xlarge
              dev-xlarge:
                display_name: Bleeding Edge ${slice(var.devTeehrVersion, 0, 6)} - XL (4 cores, 32 GB memory) 
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageId}
                  mem_limit: 32G
                  mem_guarantee: 19G
                  cpu_limit: 4
                  cpu_guarantee: 3
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-xlarge
              dev-4xlarge:
                display_name: Bleeding Edge ${slice(var.devTeehrVersion, 0, 6)} - 4XL (16 cores, 128 GB memory) 
                kubespawner_override:
                  image: ${actions.build.teehr-jupyter-driver-image-edge.outputs.deploymentImageId}
                  mem_limit: 127G
                  mem_guarantee: 76G
                  cpu_limit: 15.5
                  cpu_guarantee: 12
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-4xlarge
        kubespawner_override:
          environment:
            TEEHR_PROJECT_ID: "TEEHR"

    # prePuller:
    #   hook:
    #     enabled: false
    #   continuous:
    #     enabled: false

    scheduling:
      userScheduler:
        enabled: true
      userPods:
        nodeAffinity:
          matchNodePurpose: require
      # podPriority:
      #   enabled: true
      # userPlaceholder:
      #   enabled: true
      #   replicas: 4

    cull:
      enabled: true
      timeout: 3600
      every: 300
      adminUsers: false