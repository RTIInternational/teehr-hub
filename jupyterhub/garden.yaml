                  cpu_limit: 16
                  cpu_guarantee: 12
                  node_selector:
                    teehr-hub/nodegroup-name: nb-r5-4xlarge
        kubespawner_override:
          environment:
            TEEHR_PROJECT_ID: "TEEHR"

      # MMM Project
