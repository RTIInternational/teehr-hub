name: Garden Deploy Remote
on:
  workflow_dispatch:

permissions:
      id-token: write
      contents: read

jobs:
  garden-deploy-remote:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup app secrets
        run: |
          echo "${{ secrets.REMOTE_SECRETS }}" > teehr-cloud-core/secrets/secrets.remote.yaml
          echo "${{ secrets.REMOTE_DEPLOY }}" > teehr-cloud-core/configs/deploy.remote-aws-srvs.yaml

      - name: Validate deployment contract
        run: |
          bash teehr-cloud-core/scripts/validate-deploy-contract.sh teehr-cloud-core/configs/deploy.remote-aws-srvs.yaml

      - name: Set deployment env. vars
        id: extract_values
        run: |
          echo "CLUSTER_ARN=$(yq eval '.clusterArn' teehr-cloud-core/configs/deploy.remote-aws-srvs.yaml)" >> $GITHUB_ENV
          echo "CLUSTER_ROLE_ARN=$(yq eval '.clusterRoleArn' teehr-cloud-core/configs/deploy.remote-aws-srvs.yaml)" >> $GITHUB_ENV
          echo "ACTION_ROLE_ARN=$(yq eval '.actionRoleArn' teehr-cloud-core/configs/deploy.remote-aws-srvs.yaml)" >> $GITHUB_ENV
          echo "AWS_REGION=$(yq eval '.awsRegion' teehr-cloud-core/configs/deploy.remote-aws-srvs.yaml)" >> $GITHUB_ENV
          echo "CLUSTER_NAME=$(yq eval '.clusterName' teehr-cloud-core/configs/deploy.remote-aws-srvs.yaml)" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ACTION_ROLE_ARN }}
          output-credentials: true

      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity

      - name: AWS EKS Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${CLUSTER_NAME} --region ${AWS_REGION} --role-arn ${CLUSTER_ROLE_ARN}

      - name: Check platform prerequisites
        run: |
          bash teehr-cloud-core/scripts/check-platform-prereqs.sh

      - name: Deploy preview env with Garden
        uses: garden-io/garden-action@v2
        with:
          garden-version: 0.14.20
          command: deploy --env remote
