kind: Build
type: container
name: teehr-api

spec:
  dockerfile: Dockerfile

environments:
  - local
  - remote

---

kind: Deploy
type: kubernetes
name: teehr-api
environments:
  - local
  - remote

dependencies:
  - build.teehr-api
  - deploy.secrets

spec:
  manifestFiles:
    - manifests/service.yaml

  manifestTemplates:
    - manifests/configmap.yaml.tpl
    - manifests/deployment.yaml.tpl

  defaultTarget:
    kind: Deployment
    name: teehr-api

  sync:
    paths:
      - containerPath: /app/src
        sourcePath: ./src
        mode: one-way
        exclude: ["__pycache__", "*.pyc"]
    overrides:
      - command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]