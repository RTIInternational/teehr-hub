apiVersion: apps/v1
kind: Deployment
metadata:
  name: teehr-api
  labels:
    app: teehr-api
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teehr-api
  template:
    metadata:
      labels:
        app: teehr-api
        component: backend
    spec:
      serviceAccountName: teehr-api
      # nodeSelector:
      #   teehr-hub/nodegroup-name: core-a
      containers:
      - name: teehr-api
        image: ${actions.build.teehr-api.outputs.deploymentImageId}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: TRINO_HOST
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: TRINO_HOST
        - name: TRINO_PORT
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: TRINO_PORT
        - name: TRINO_USER
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: TRINO_USER
        - name: TRINO_CATALOG
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: TRINO_CATALOG
        - name: TRINO_SCHEMA
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: TRINO_SCHEMA
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: CORS_ORIGINS
        # Analytics job configuration
        - name: API_JOB_NAMESPACE
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: API_JOB_NAMESPACE
        - name: API_JOB_SERVICE_ACCOUNT
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: API_JOB_SERVICE_ACCOUNT
        - name: API_JOB_IMAGE
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: API_JOB_IMAGE
        - name: TEEHR_SPARK_IMAGE
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: TEEHR_SPARK_IMAGE
        - name: TEEHR_NAMESPACE
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: TEEHR_NAMESPACE
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: AWS_REGION
        - name: REMOTE_CATALOG_REST_URI
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: REMOTE_CATALOG_REST_URI
        - name: REMOTE_CATALOG_TYPE
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: REMOTE_CATALOG_TYPE
        - name: REMOTE_WAREHOUSE_S3_PATH
          valueFrom:
            configMapKeyRef:
              name: teehr-api-config
              key: REMOTE_WAREHOUSE_S3_PATH
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            cpu: 1
            memory: 4Gi
          limits:
            cpu: 2
            memory: 8Gi