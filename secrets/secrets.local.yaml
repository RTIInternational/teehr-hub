secrets:
  jupyterhub:
    data:
      OAUTH_CLIENT_ID: jupyterhub
      OAUTH_CLIENT_SECRET: local-jupyterhub-client-secret
  prefect-db-secrets:
    data:
      database: prefect
      username: prefect
      password: prefect123
      connection-string: postgresql+asyncpg://prefect:prefect123@prefect-pg:5432/prefect
  iceberg-db-secrets:
    data:
      database: iceberg
      username: iceberg
      password: iceberg123
  keycloak-db-secrets:
    data:
      database: keycloak
      username: keycloak
      password: keycloak123
  keycloak-admin-secrets:
    data:
      username: admin
      password: admin123
  keycloak-secrets:
    data:
      host: auth.teehr.local.app.garden
      realm: teehr
      frontend-client-id: teehr-frontend
      api-client-id: teehr-api
      jupyter-client-id: jupyterhub
      api-key-hash-salt: local-dev-change-me
      smtp-host: smtp.gmail.com
      smtp-port: "587"
      smtp-from: CHANGE_ME_GMAIL_ADDRESS
      smtp-from-display-name: TEEHR Hub
      smtp-reply-to: CHANGE_ME_GMAIL_ADDRESS
      smtp-reply-to-display-name: TEEHR Support
      smtp-username: CHANGE_ME_GMAIL_ADDRESS
      smtp-password: CHANGE_ME_GMAIL_APP_PASSWORD
      smtp-starttls: "true"
      smtp-ssl: "false"
  # prefect-auth:
  #   data:
  #     auth-string: "admin:password"
  minio-secrets:
    data:
      accesskey: minioadmin
      secretkey: minioadmin123
  prefect-workflow-secrets:
    data:
      api-usgs-pat: CHANGE_ME_API_USGS_PAT