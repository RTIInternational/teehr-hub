secrets:
  jupyterhub:
    data:
      OAUTH_CLIENT_ID: jupyterhub
      OAUTH_CLIENT_SECRET: local-jupyterhub-client-secret
  prefect-db-secrets:
    data:
      database: prefect
      username: prefect
      password: prefect123
      connection-string: postgresql+asyncpg://prefect:prefect123@prefect-pg:5432/prefect
  iceberg-db-secrets:
    data:
      database: iceberg
      username: iceberg
      password: iceberg123
  keycloak-db-secrets:
    data:
      database: keycloak
      username: keycloak
      password: keycloak123
  keycloak-admin-secrets:
    data:
      username: admin
      password: admin123
  keycloak-secrets:
    data:
      api-key-hash-salt: local-dev-change-me
      smtp-from: CHANGE_ME_GMAIL_ADDRESS
      smtp-reply-to: CHANGE_ME_GMAIL_ADDRESS
      smtp-username: CHANGE_ME_GMAIL_ADDRESS
      smtp-password: CHANGE_ME_GMAIL_APP_PASSWORD
  prefect-oidc-secrets:
    data:
      client-secret: local-prefect-oidc-client-secret
      cookie-secret: 0123456789abcdef0123456789abcdef
  teehr-api-secrets:
    data:
      client-secret: local-teehr-api-client-secret
  minio-secrets:
    data:
      accesskey: minioadmin
      secretkey: minioadmin123
  prefect-workflow-secrets:
    data:
      api-usgs-pat: CHANGE_ME_API_USGS_PAT