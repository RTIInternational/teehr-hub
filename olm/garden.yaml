kind: Deploy
type: exec
name: olm-crds
description: Install OLM CRDs for local kind
environments:
  - local
  - remote
spec:
  deployCommand:
    - kubectl
    - apply
    - --server-side
    - -f
    - ./manifests/crds.yaml
---
kind: Deploy
type: exec
name: olm
description: Install OLM core components for local kind
dependencies:
  - deploy.olm-crds
environments:
  - local
  - remote
spec:
  deployCommand:
    - kubectl
    - apply
    - -f
    - ./manifests/olm.yaml
