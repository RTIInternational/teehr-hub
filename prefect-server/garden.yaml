kind: Deploy
type: helm
name: prefect-server
environments:
  - local
  - remote
dependencies:
  - deploy.secrets
  - deploy.prefect-database
spec:
  chart:
    name: prefect-server
    repo: https://prefecthq.github.io/prefect-helm
  values:
    global:
      prefect:
        image:
          repository: prefecthq/prefect
          prefectTag: 3.4.24-python3.12

    # server:
    #   nodeSelector:
    #     fved/nodegroup-name: core-a

    server:
      uiConfig:
        prefectUiApiUrl: https://prefect.${var.hostname}/api
      resources:
        requests:
          cpu: "1"
          memory: "${environment.name == 'local' ? '1Gi' : '2Gi'}"
        limits:
          cpu: "2"
          memory: 4Gi
      env:
        - name: PREFECT_SERVER_DATABASE_SQLALCHEMY_POOL_SIZE
          value: "20"
        - name: PREFECT_SERVER_DATABASE_SQLALCHEMY_MAX_OVERFLOW
          value: "20"
        - name: PREFECT_SERVER_DATABASE_SQLALCHEMY_POOL_TIMEOUT
          value: "90"
        - name: PREFECT_SERVER_DATABASE_CONNECTION_TIMEOUT
          value: "15"
        - name: PREFECT_SERVER_DATABASE_TIMEOUT
          value: "60"
        - name: PREFECT_SERVER_CONCURRENCY_MAXIMUM_CONCURRENCY_SLOT_WAIT_SECONDS
          value: "180"
        - name: PREFECT_DEPLOYMENT_CONCURRENCY_SLOT_WAIT_SECONDS
          value: "180"
        - name: PREFECT_SERVER_EVENTS_STREAM_OUT_ENABLED
          value: "false"
        - name: PREFECT_API_URL
          value: https://prefect.${var.hostname}/api
        - name: PREFECT_SERVER_SERVICES_DB_VACUUM_ENABLED
          value: "events,flow_runs"
        - name: PREFECT_EVENTS_RETENTION_PERIOD
          value: "2d"
        - name: PREFECT_SERVER_SERVICES_DB_VACUUM_RETENTION_PERIOD
          value: "1209600"
        - name: PREFECT_SERVER_SERVICES_DB_VACUUM_LOOP_SECONDS
          value: "1800"
        - name: PREFECT_SERVER_SERVICES_DB_VACUUM_BATCH_SIZE
          value: "50"

    # Don't create a secret - use the existing one
    secret:
      create: false
      name: prefect-db-secrets  # Reference your existing secret
    
    # Disable built-in PostgreSQL
    postgresql:
      enabled: false
---
kind: Deploy
type: kubernetes
name: prefect-oidc-proxy
dependencies:
  - deploy.secrets
  - deploy.keycloak-bootstrap
  - deploy.prefect-server
environments:
  - local
  - remote
spec:
  manifestTemplates:
    - manifests/oauth2-proxy.yaml.tpl
---
kind: Deploy
type: helm
name: prefect-worker
dependencies:
  - deploy.prefect-server
environments:
  - local
  - remote
spec:
  chart:
    name: prefect-worker
    repo: https://prefecthq.github.io/prefect-helm
  values:
    worker:
      image:
        repository: prefecthq/prefect
        prefectTag: 3.4.24-python3.12-kubernetes 
      autoscaling:
        enabled: ${environment.name == "remote"}
        maxReplicas: 1
      apiConfig: selfHostedServer
      selfHostedServerApiConfig:
        # -- prefect API url (PREFECT_API_URL); should be in-cluster URL if the worker is deployed in the same cluster as the API
        apiUrl: http://prefect-server:4200/api
      config:
        workPool: kubernetes-pool
      replicaCount: 1
      # nodeSelector:
      #   fved/nodegroup-name: core-a