apiVersion: garden.io/v2
kind: Project
name: teehr-hub
defaultEnvironment: local

variables:
  smtp:
    host: smtp.gmail.com
    port: "587"
    fromDisplayName: TEEHR Hub
    replyToDisplayName: TEEHR Support
    starttls: "true"
    ssl: "false"

environments:
  - name: local
    defaultNamespace: ${project.name}
    variables:
      hostname: teehr.local.app.garden
      devTeehrVersion: 267f8a75034132aefe84749af10ab1562a6ac169
      stableTeehrVersion: place-holder # Needed for sync to work for some reason.
      iceberg:
        inCluster: "true"
        catalogS3PathStyleAccess: "true"
        catalogS3Endpoint: "http://minio:9000"
        catalogType: rest
        catalogUri: http://iceberg-rest:8181
        catalogWarehouse: s3://warehouse/
      trino:
        host: trino
        port: "8080"
        user: teehr
        catalog: iceberg
        schema: teehr
      allowedOrigins: "https://dashboards.${var.hostname},https://api.${var.hostname}"
  - name: remote
    defaultNamespace: ${project.name}
    variables:
      hostname: fved.dev.low.amzifved.aws.rti.org
      devTeehrVersion: 267f8a75034132aefe84749af10ab1562a6ac169
      stableTeehrVersion: v0.6.5
      previousTeehrVersion: v0.5.3
      iceberg:
        inCluster: "false"
        catalogS3PathStyleAccess: "false"
        catalogS3Endpoint: ""
        catalogUri: http://iceberg-rest:8181
        catalogType: rest
        catalogWarehouse: s3://dev-fved-iceberg-warehouse-rti-use1/
      nfsServerDns: "fs-0d53828f401595456.efs.us-east-1.amazonaws.com"
      trino:
        host: trino
        port: "8080"
        user: teehr
        catalog: iceberg
        schema: teehr
      allowedOrigins: "https://dashboards.${var.hostname},https://api.${var.hostname}"
providers:
  # The name of the provider plugin to use.
  - name: local-kubernetes
    namespace: ${environment.namespace}
    environments: ["local"]
    setupIngressController: false
    deploymentRegistry:
      hostname: localhost:5001
      namespace: ${project.name}
    context: kind-kind
  - name: kubernetes
    namespace: ${environment.namespace}
    environments: ["remote"]
    imagePullSecrets:
      - name: ecr-config
        namespace: ecr-secrets
    deploymentRegistry:
      hostname: 794457362858.dkr.ecr.us-east-1.amazonaws.com
      namespace: fved
    context: arn:aws:eks:us-east-1:794457362858:cluster/fved-cluster
    buildMode: cluster-buildkit
    defaultHostname: fved.dev.low.amzifved.aws.rti.org