apiVersion: garden.io/v1
kind: Project
name: teehr-hub
defaultEnvironment: local

variables:

environments:
  - name: local
    defaultNamespace: ${project.name}
    variables:
      hostname: teehr.local.app.garden
      devTeehrVersion: 2430d93c20241098096bf7cadd3b85986a2fcf5e
      stableTeehrVersion: place-holder # Needed for sync to work for some reason.
      iceberg:
        inCluster: "true"
        catalogS3PathStyleAccess: "true"
        catalogS3Endpoint: "http://minio:9000"
        catalogType: rest
        catalogUri: http://iceberg-rest:8181
        catalogWarehouse: s3://warehouse/
      trino:
        host: trino
        port: "8080"
        user: teehr
        catalog: iceberg
        schema: teehr
      allowedOrigins: "https://dashboards.${var.hostname},https://api.${var.hostname}"
  - name: remote
    defaultNamespace: ${project.name}
    variables:
      hostname: teehr.rtiamanzi.org
      devTeehrVersion: 2430d93c20241098096bf7cadd3b85986a2fcf5e
      stableTeehrVersion: v0.5.3
      previousTeehrVersion: v0.5.0
      # CIROH projects for JupyterHub profile generation
      # Each project gets dedicated node groups: nb-r5-xlarge-{suffix}, nb-r5-4xlarge-{suffix}, spark-r5-4xlarge-spot-{suffix}
      # Use empty suffix "" for the default TEEHR project (uses base node groups)
      cirohProjects:
        - name: "TEEHR"
          id: "TEEHR"
          suffix: ""
          default: true
        - name: "MMM"
          id: "MMM"
          suffix: "-mmm"
          default: false
        - name: "Testbed"
          id: "Testbed"
          suffix: "-testbed"
          default: false
        - name: "ResOps"
          id: "ResOps"
          suffix: "-resops"
          default: false
        - name: "FIRO"
          id: "FIRO"
          suffix: "-firo"
          default: false
      iceberg:
        inCluster: "false"
        catalogS3PathStyleAccess: "false"
        catalogS3Endpoint: ""
        catalogUri: http://iceberg-rest:8181
        catalogType: rest
        catalogWarehouse: s3://dev-teehr-iceberg-warehouse/
      nfsServerDns: "fs-0cb715f5b7a76e862.efs.us-east-2.amazonaws.com"
      trino:
        host: trino
        port: "8080"
        user: teehr
        catalog: iceberg
        schema: teehr
      allowedOrigins: "https://dashboards.${var.hostname},https://api.${var.hostname}"
providers:
  # The name of the provider plugin to use.
  - name: local-kubernetes
    namespace: ${environment.namespace}
    environments: ["local"]
    setupIngressController: false
    deploymentRegistry:
      hostname: localhost:5001
      namespace: ${project.name}
    context: kind-kind
  - name: kubernetes
    namespace: ${environment.namespace}
    environments: ["remote"]
    imagePullSecrets:
      - name: ecr-config
        namespace: default
    deploymentRegistry:
      hostname: 935462133478.dkr.ecr.us-east-2.amazonaws.com
      namespace: ${project.name}
    context: arn:aws:eks:us-east-2:935462133478:cluster/teehr-hub
    buildMode: cluster-buildkit
    defaultHostname: teehr.rtiamanzi.org