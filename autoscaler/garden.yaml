# Garden module to deploy Cluster Autoscaler Helm chart to kube-system with IRSA
kind: Deploy
type: helm
name: cluster-autoscaler
description: Deploy Cluster Autoscaler to kube-system with IRSA
environments:
  - remote
spec:
  chart:
    repo: https://kubernetes.github.io/autoscaler
    name: cluster-autoscaler
    version: 9.29.0 # Use latest compatible version
  namespace: kube-system
  values:
    autoDiscovery:
      clusterName: fved-cluster
    awsRegion: us-east-1
    rbac:
      create: true
      serviceAccount:
        name: cluster-autoscaler
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::794457362858:role/ClusterAutoscalerRole-fved-cluster
    extraArgs:
      scale-down-unneeded-time: 5m
      skip-nodes-with-local-storage: "false"
      balance-similar-node-groups: "true"
      expander: least-waste
---
kind: Deploy
type: kubernetes
name: node-termination-handler
description: AWS Node Termination Handler to gracefully handle spot instance interruptions
spec:
  manifestFiles:
    - "./manifests/node-termination-handler.yaml"
environments:
  - remote