kind: Deploy
type: helm
name: cert-manager
environments:
  - local
spec:
  chart:
    name: cert-manager
    repo: https://charts.jetstack.io
    version: "v1.18.2"
  namespace: cert-manager
  values:
    crds:
      enabled: true
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::794457362858:role/fved-cert-manager-route53-irsa
    extraArgs:
      - --dns01-recursive-nameservers=169.254.169.253:53
      - --dns01-recursive-nameservers-only
---
kind: Deploy
type: kubernetes
name: letsencrypt
description: K8s Lets Encrypt
spec:
  manifestFiles:
    - "./manifests/letsencrypt-self-signed.yaml"
dependencies:
  - deploy.cert-manager
environments:
  - local
---
kind: Deploy
type: kubernetes
name: cert
description: K8s Cert
spec:
  manifestTemplates:
    - "./manifests/cert.yaml.tpl"
dependencies:
  - deploy.letsencrypt
environments:
  - local
  - remote